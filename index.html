<!DOCTYPE html>
<html lang="sk" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM703 · Alex · Zell am See 2026</title>
<style>
/* ═══ RESET & BASE ═══════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

/* ═══ THEME VARS ══════════════════════════════════════════════════════════ */
:root{
  --bg:#f1f5f9;--surf:#ffffff;--surf2:#f8fafc;--surf3:#f1f5f9;
  --brd:#e2e8f0;--brd2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --accent:#3b82f6;--accent-lt:#dbeafe;
  --run:#ea580c;--run-lt:#ffedd5;--run-br:#fed7aa;
  --swim:#0284c7;--swim-lt:#e0f2fe;--swim-br:#bae6fd;
  --bike:#15803d;--bike-lt:#dcfce7;--bike-br:#bbf7d0;
  --brick:#9333ea;--brick-lt:#f3e8ff;--brick-br:#e9d5ff;
  --str:#b45309;--str-lt:#fef3c7;--str-br:#fde68a;
  --rest:#475569;--rest-lt:#f1f5f9;--rest-br:#e2e8f0;
  --green:#16a34a;--green-lt:#dcfce7;
  --red:#dc2626;--red-lt:#fee2e2;
  --amber:#d97706;--amber-lt:#fef3c7;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --r:10px;--rlg:14px;
}
[data-theme="dark"]{
  --bg:#0a0f1e;--surf:#111827;--surf2:#1e293b;--surf3:#334155;
  --brd:#1e293b;--brd2:#334155;
  --txt:#f8fafc;--txt2:#94a3b8;--txt3:#475569;
  --run-lt:#431407;--run-br:#7c2d12;
  --swim-lt:#0c1a2e;--swim-br:#075985;
  --bike-lt:#052e16;--bike-br:#14532d;
  --brick-lt:#2e1065;--brick-br:#6b21a8;
  --str-lt:#451a03;--str-br:#78350f;
  --rest-lt:#1e293b;--rest-br:#334155;
  --accent-lt:#1e3a5f;--green-lt:#052e16;--red-lt:#450a0a;--amber-lt:#451a03;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
}

/* ═══ PC LAYOUT ═══════════════════════════════════════════════════════════ */
.pc-app{
  display:flex;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  transition:background .2s,color .2s;
  color:var(--txt);
}

/* SIDEBAR */
.sidebar{
  width:220px;
  flex-shrink:0;
  height:100vh;
  background:#0d1117;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-right:1px solid #1a2332;
  transition:background .2s;
}
[data-theme="dark"] .sidebar{background:#080c14;border-color:#0f172a}

.sb-logo{padding:22px 18px 16px;border-bottom:1px solid #1a2332;flex-shrink:0}
.sb-logo-ico{font-size:26px;display:block;margin-bottom:8px}
.sb-logo-title{font-size:16px;font-weight:800;color:#f8fafc;letter-spacing:-.4px}
.sb-logo-sub{font-size:10px;color:#334155;margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sb-cd{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:11px;font-weight:700;color:#3b82f6;background:rgba(59,130,246,.12);padding:4px 10px;border-radius:20px;border:1px solid rgba(59,130,246,.2)}

.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .15s;
  color:#475569;font-size:13px;font-weight:600;
  border:1px solid transparent;background:none;width:100%;text-align:left;
}
.sb-item:hover{background:rgba(255,255,255,.04);color:#94a3b8}
.sb-item.active{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(139,92,246,.12));color:#93c5fd;border-color:rgba(59,130,246,.2)}
.sb-ico{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sb-lbl{flex:1}
.sb-key{font-size:9px;font-weight:700;background:rgba(255,255,255,.06);padding:2px 5px;border-radius:4px;color:#334155;border:1px solid #1e293b;font-family:monospace}
.sb-divider{height:1px;background:#1a2332;margin:6px 0}

.sb-bottom{padding:10px;flex-shrink:0;border-top:1px solid #1a2332;display:flex;flex-direction:column;gap:1px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;color:#475569;background:none;border:none;width:100%;text-align:left;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.04);color:#94a3b8}

/* MAIN */
.pc-main{
  flex:1;
  min-width:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* TOP BAR */
.pc-topbar{
  height:52px;
  flex-shrink:0;
  background:var(--surf);
  border-bottom:1px solid var(--brd);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 24px;
  box-shadow:0 1px 0 var(--brd);
}
.pc-tb-title{font-size:15px;font-weight:700;color:var(--txt);flex:1}
.pc-tb-actions{display:flex;gap:8px;align-items:center}
.btn-new{
  display:flex;align-items:center;gap:6px;
  padding:7px 18px;font-size:12px;font-weight:700;
  border-radius:9px;border:none;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;cursor:pointer;transition:all .15s;
  box-shadow:0 2px 8px rgba(37,99,235,.3);letter-spacing:-.1px;
}
.btn-new:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-new:active{transform:none}
.tb-icon-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--brd);background:var(--surf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--txt2);flex-shrink:0;transition:all .15s}
.tb-icon-btn:hover{background:var(--surf2)}

/* SCROLL AREA */
.pc-scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:20px 24px;
  background:var(--bg);
}
.pc-scroll::-webkit-scrollbar{width:5px}
.pc-scroll::-webkit-scrollbar-track{background:transparent}
.pc-scroll::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}

/* VIEWS */
.view{display:none;width:100%;animation:fadeIn .18s ease}
.view.active{display:block;width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* TWO/THREE COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;align-items:start}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;width:100%;align-items:start}

/* CARDS */
.card{background:var(--surf);border-radius:var(--rlg);border:1px solid var(--brd);box-shadow:var(--shadow);overflow:hidden;width:100%;margin-bottom:14px}
.cp{padding:18px 20px}
.card-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.card-sub{font-size:11px;color:var(--txt3);margin-bottom:14px}

/* SPLASH */
.splash{position:fixed;inset:0;background:#0d1117;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s,visibility .5s}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-ico{font-size:52px;animation:pulse 1.5s infinite}
.splash-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px}
.splash-sub{font-size:13px;color:#64748b;font-weight:500}
.splash-bar{width:200px;height:3px;background:#1e293b;border-radius:3px;overflow:hidden;margin-top:8px}
.splash-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;animation:load 1.8s ease-out forwards}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes load{0%{width:0}100%{width:100%}}

/* TODAY CARD */
.today-card{background:linear-gradient(135deg,#0d1117 0%,#1a1f35 60%,#0d1117 100%);color:#fff;border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid #1e2d45}
.today-card::before{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;background:rgba(59,130,246,.1);border-radius:50%}
.today-card::after{content:'';position:absolute;bottom:-40px;left:20px;width:120px;height:120px;background:rgba(234,88,12,.07);border-radius:50%}
.today-lbl{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;position:relative;z-index:1}
.today-date{font-size:24px;font-weight:800;color:#fff;position:relative;z-index:1;margin:4px 0 14px;letter-spacing:-.5px}
.today-sess{position:relative;z-index:1}
.today-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.3px;color:#fff}
.today-name{font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px}
.today-meta{font-size:12px;color:#64748b}
.today-actions{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
.today-btn{flex:1;padding:10px;font-size:12px;font-weight:700;border-radius:10px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.1px}
.today-btn.pri{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.today-btn.sec{background:rgba(255,255,255,.08);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
.today-btn.done{background:#16a34a;color:#fff}
.today-btn:hover{filter:brightness(1.08)}

/* RINGS */
.rings-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.ring-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rlg);padding:16px 10px;text-align:center;box-shadow:var(--shadow)}
.ring-wrap{position:relative;width:76px;height:76px;margin:0 auto 10px}
.ring-svg{width:76px;height:76px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--brd);stroke-width:5}
.ring-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--txt)}
.ring-lbl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}

/* STREAK */
.streak-card{background:linear-gradient(135deg,#92400e,#c2410c,#ea580c);color:#fff;border-radius:var(--rlg);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-md)}
.streak-ico{font-size:36px;line-height:1}
.streak-val{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.5px}
.streak-lbl{font-size:11px;opacity:.85;font-weight:600;margin-top:3px}

/* PR BANNER */
.pr-banner{background:linear-gradient(135deg,#4c1d95,#1d4ed8);color:#fff;border-radius:var(--rlg);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-md)}
.pr-close{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;opacity:.6;padding:0 4px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cal-nav{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--brd);background:var(--surf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--txt2);flex-shrink:0;transition:all .15s}
.cal-nav:hover{background:var(--surf2)}
.cal-title-txt{flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--txt)}
.cal-day-names{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;padding:6px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  border-radius:10px;display:flex;flex-direction:column;
  cursor:pointer;transition:all .12s;position:relative;
  border:1.5px solid transparent;
  min-height:90px;
  padding:8px 10px;
}
.cal-cell:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cal-cell.empty{opacity:0;pointer-events:none;min-height:90px}
.cal-cell.preseason{background:var(--surf2);border-color:var(--brd)}
.cal-cell.planned{background:var(--surf2);border-color:var(--brd)}
.cal-cell.future{background:var(--surf2);border-color:var(--brd);opacity:.55}
.cal-cell.done{border-color:transparent}
.cal-cell.missed{background:var(--red-lt);border-color:#fecaca}
[data-theme="dark"] .cal-cell.missed{border-color:#7f1d1d}
.cal-cell.today{box-shadow:0 0 0 2px #3b82f6,0 0 0 4px rgba(59,130,246,.2)!important}
.cal-num{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:3px;line-height:1}
.cal-cell.today .cal-num{color:#3b82f6;font-size:13px;font-weight:800}
.cal-ico{font-size:16px;line-height:1;margin-bottom:4px}
.cal-plan-txt{font-size:10px;font-weight:600;color:var(--txt3);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cal-cell.done .cal-plan-txt{color:rgba(255,255,255,.7)}
.cal-sess-hr{font-size:10px;font-weight:700;margin-top:auto;padding-top:4px;opacity:.8}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:auto}

/* TOOLTIP */
.cal-tip{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#0d1117;color:#f8fafc;font-size:11px;font-weight:600;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid #1e293b;min-width:100px;text-align:center}
.cal-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0d1117}
.cal-cell:hover .cal-tip{display:block}

/* WEEK BARS */
.wk-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--brd)}
.wk-num{font-size:10px;font-weight:700;color:var(--txt3);min-width:30px}
.wk-pill{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.wk-prog{flex:1;height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
.wk-prog-fill{height:100%;border-radius:3px;transition:width .5s ease}
.wk-pct{font-size:10px;font-weight:700;color:var(--txt3);min-width:30px;text-align:right}

/* SUMMARY BAR */
.sum-bar{background:var(--surf);border-radius:var(--rlg);padding:14px;margin-bottom:14px;border:1px solid var(--brd);box-shadow:var(--shadow)}
.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sm{border-radius:10px;padding:12px 6px;text-align:center}
.sm-val{font-size:18px;font-weight:700;line-height:1.2}
.sm-lbl{font-size:9px;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;opacity:.7}
.sm.r{background:var(--run-lt);color:var(--run)}.sm.s{background:var(--swim-lt);color:var(--swim)}
.sm.b{background:var(--bike-lt);color:var(--bike)}.sm.br{background:var(--brick-lt);color:var(--brick)}
.sm.k{background:#fce7f3;color:#be185d}
[data-theme="dark"] .sm.k{background:#4a044e;color:#f0abfc}

/* LOG FILTERS */
.log-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lfil{padding:5px 13px;font-size:11px;font-weight:700;border-radius:20px;border:1.5px solid var(--brd);background:var(--surf);color:var(--txt3);cursor:pointer;transition:all .15s}
.lfil.active{background:#0d1117;color:#fff;border-color:#0d1117}
[data-theme="dark"] .lfil.active{background:#f1f5f9;color:#0d1117}
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;padding:9px 12px 9px 36px;font-size:13px;border:1.5px solid var(--brd);border-radius:10px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.log-tools{display:flex;gap:6px;margin-bottom:12px}
.tool-btn{flex:1;padding:8px;font-size:11px;font-weight:700;border-radius:9px;border:1.5px solid var(--brd);background:var(--surf);color:var(--txt2);cursor:pointer;transition:all .15s;text-align:center}
.tool-btn:hover{background:var(--surf2)}
.view-tog{display:flex;gap:4px}
.vtbtn{padding:5px 10px;font-size:11px;font-weight:700;border-radius:7px;border:1.5px solid var(--brd);background:var(--surf2);color:var(--txt3);cursor:pointer;transition:all .15s}
.vtbtn.active{background:#0d1117;color:#fff;border-color:#0d1117}
[data-theme="dark"] .vtbtn.active{background:#f1f5f9;color:#0d1117}

/* SESSION CARDS */
.scard{border-radius:var(--rlg);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);border:1px solid transparent;transition:box-shadow .15s,transform .15s}
.scard:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sc-top{padding:14px}
.sc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;color:#fff}
.sc-title{font-size:15px;font-weight:700;color:var(--txt)}
.sc-meta{font-size:11px;color:var(--txt2);margin-top:2px;font-weight:500}
.sc-ph{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap}
.mc-grid{display:grid;gap:6px;margin-bottom:10px}
.mc4{grid-template-columns:repeat(4,1fr)}.mc3{grid-template-columns:repeat(3,1fr)}.mc2{grid-template-columns:repeat(2,1fr)}
.mc{border-radius:8px;padding:9px 6px;text-align:center;border:1px solid}
.mc-val{font-size:15px;font-weight:700;line-height:1.2}
.mc-lbl{font-size:9px;font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.3px;opacity:.6}
.zbar-sc{display:flex;border-radius:6px;overflow:hidden;height:16px;margin-bottom:5px}
.zleg-sc{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.zl-item{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--txt2)}
.zdot{width:7px;height:7px;border-radius:50%}
.sc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sc-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.sc-note{font-size:12px;line-height:1.6;padding:9px 11px;border-radius:8px;border-left:3px solid}
.sc-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid}
.sc-stars{display:flex;gap:2px}
.sc-star{font-size:14px;cursor:pointer;color:var(--brd2);transition:color .1s;line-height:1}
.sc-star.on{color:#f59e0b}
.btn-del{font-size:10px;font-weight:700;color:var(--red);background:none;border:none;cursor:pointer;padding:3px 7px;border-radius:6px}
.btn-del:hover{background:var(--red-lt)}

/* LOG TABLE */
.log-tbl{width:100%;border-collapse:collapse;font-size:13px}
.log-tbl th{text-align:left;padding:11px 16px;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);background:var(--surf2);white-space:nowrap}
.log-tbl td{padding:10px 16px;border-bottom:1px solid var(--brd);color:var(--txt);vertical-align:middle}
.log-tbl tr:hover td{background:var(--surf2);cursor:pointer}
.lbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff;white-space:nowrap}
.lzbar{width:60px;height:7px;border-radius:4px;overflow:hidden;display:flex}

/* CHARTS */
.chart-card{background:var(--surf);border-radius:var(--rlg);padding:18px 20px;margin-bottom:14px;border:1px solid var(--brd);box-shadow:var(--shadow)}
.chart-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.ctab{padding:5px 12px;font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid var(--brd);background:var(--surf2);color:var(--txt3);cursor:pointer;transition:all .15s}
.ctab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.chart-wrap{position:relative;height:220px;margin-bottom:8px}
.chart-empty{height:220px;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:12px;background:var(--surf2);border-radius:8px;flex-direction:column;gap:8px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2);font-weight:500}
.cl-dot{width:8px;height:8px;border-radius:50%}

/* WEEKLY */
.wk-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.wk-nav-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--brd);background:var(--surf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--txt2);transition:all .15s}
.wk-nav-btn:hover{background:var(--surf2)}
.wk-nav-title{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--txt)}
.wk-days-row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.wk-day-cell{border-radius:12px;padding:12px 8px 10px;text-align:center;border:1.5px solid var(--brd);background:var(--surf2);min-height:100px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .12s}
.wk-day-cell:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.wk-day-cell.has-sess{border-color:transparent}
.wk-day-cell.missed-cell{background:var(--red-lt);border-color:#fecaca}
.wkd-name{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;margin-bottom:6px}
.wkd-ico{font-size:22px;margin-bottom:5px;line-height:1}
.wkd-lbl{font-size:10px;font-weight:600;color:var(--txt2);line-height:1.3;text-align:center}
.wk-stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.wks{background:var(--surf2);border-radius:12px;padding:14px;text-align:center}
.wks-val{font-size:22px;font-weight:700;color:var(--txt)}
.wks-lbl{font-size:10px;color:var(--txt3);margin-top:4px;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.feel-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.feel-lbl{font-size:11px;font-weight:600;color:var(--txt2);min-width:76px}
.feel-stars{display:flex;gap:3px}
.feel-star{font-size:20px;cursor:pointer;color:var(--brd2);line-height:1;transition:color .1s}
.feel-star.on{color:#f59e0b}
.wk-note-inp{width:100%;font-size:13px;padding:10px 12px;border:1.5px solid var(--brd);border-radius:10px;background:var(--surf);color:var(--txt);resize:none;outline:none;margin-bottom:10px}
.wk-note-inp:focus{border-color:var(--accent)}
.btn-wk-save{width:100%;padding:11px;font-size:13px;font-weight:700;background:#0d1117;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all .15s}
.btn-wk-save:hover{filter:brightness(1.2)}
[data-theme="dark"] .btn-wk-save{background:#f1f5f9;color:#0d1117}
.z2-warn{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
[data-theme="dark"] .z2-warn{border-color:#78350f}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surf);border-radius:18px;padding:24px;width:90%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.35)}
[data-theme="dark"] .modal{box-shadow:0 24px 60px rgba(0,0,0,.6)}
.modal-title{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:4px}
.modal-date{font-size:12px;color:var(--txt3);margin-bottom:18px}

/* PLAN BLOCK */
.plan-block{background:var(--surf2);border-radius:12px;padding:14px;border:1px solid var(--brd);margin-bottom:16px}
.plan-block-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.plan-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.plan-item:last-child{border-bottom:none;padding-bottom:0}
.plan-item-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.plan-item-name{font-size:13px;font-weight:600;color:var(--txt);line-height:1.3}
.plan-item-meta{font-size:11px;color:var(--txt3);margin-top:2px}

/* FORM ELEMENTS */
.modal-form-title{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.modal-form-title::after{content:'';flex:1;height:1px;background:var(--brd)}
.mg{display:grid;gap:10px}.mg2{grid-template-columns:1fr 1fr}.mg3{grid-template-columns:1fr 1fr 1fr}.mg4{grid-template-columns:1fr 1fr 1fr 1fr}
.mfield{display:flex;flex-direction:column;gap:4px}
.mflbl{font-size:11px;font-weight:600;color:var(--txt2)}
.miw{position:relative;display:flex;align-items:center}
.miw .mfi{padding-right:36px}
.miu{position:absolute;right:10px;font-size:10px;font-weight:700;color:var(--txt3);pointer-events:none;text-transform:uppercase}
.mfi{font-size:13px;padding:9px 12px;border:1.5px solid var(--brd);border-radius:9px;background:var(--surf);color:var(--txt);outline:none;width:100%;transition:border-color .15s}
.mfi:focus{border-color:var(--accent)}
.mfi::placeholder{color:var(--txt3)}
textarea.mfi{resize:none}
.chips-row{display:flex;gap:5px;flex-wrap:wrap}
.mchip{padding:5px 11px;font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid var(--brd);background:var(--surf2);color:var(--txt2);cursor:pointer;transition:all .12s}
.stars-row{display:flex;gap:4px}
.mstar{font-size:22px;cursor:pointer;color:var(--brd2);transition:color .1s;line-height:1}
.mstar.on{color:#f59e0b}
.zrow4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.zf4{display:flex;flex-direction:column;align-items:center;gap:4px}
.zlbl4{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;color:#fff;text-transform:uppercase;letter-spacing:.3px}
.zin4{font-size:14px;font-weight:700;padding:8px 4px;border:1.5px solid var(--brd);border-radius:8px;background:var(--surf);color:var(--txt);text-align:center;width:100%;outline:none}
.zin4:focus{border-color:var(--accent)}
.zbar4{height:14px;border-radius:6px;overflow:hidden;display:flex;background:var(--brd);margin-bottom:3px}
.ztot4{font-size:10px;font-weight:600;text-align:right;margin-bottom:8px}
.modal-footer{display:flex;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--brd)}
.btn-primary{flex:1;padding:12px;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;color:#fff;transition:all .15s}
.btn-primary:hover{filter:brightness(1.08)}
.btn-secondary{padding:12px 18px;font-size:12px;font-weight:600;border:1.5px solid var(--brd);border-radius:10px;background:var(--surf);color:var(--txt2);cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:var(--surf2)}
.btn-garmin-sm{padding:10px 14px;font-size:11px;font-weight:700;border:1.5px solid var(--bike-br);border-radius:10px;background:var(--bike-lt);color:#15803d;cursor:pointer;display:flex;align-items:center;gap:5px}
.m-ext{margin-bottom:8px;display:none}
.m-ext.show{display:block}
.exf{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:9px 12px}
.exf label{font-size:10px;font-weight:700;color:var(--txt2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.exf input{font-size:12px;padding:6px 9px;border:1px solid var(--brd);border-radius:7px;background:var(--surf);color:var(--txt);width:100%;outline:none}
.exf input:focus{border-color:var(--accent)}

/* DRAG ZONE */
.drag-zone{position:fixed;inset:0;z-index:9000;background:rgba(37,99,235,.1);backdrop-filter:blur(6px);border:2.5px dashed #3b82f6;border-radius:20px;margin:12px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:none}
.drag-zone.show{display:flex}
.dz-ico{font-size:52px}
.dz-txt{font-size:20px;font-weight:800;color:#3b82f6}
.dz-sub{font-size:13px;color:#64748b;font-weight:600}

/* EMPTY */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-txt{font-size:13px;font-weight:500}

@media(max-width:900px){
  .sidebar{width:180px}
  .two-col{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr 1fr}
}

function getPlanForDate(date){
  const d = new Date(date); d.setHours(0,0,0,0);
  if(d < PREP_START) return null; // pre-season
  const daysSinceStart = Math.floor((d - PREP_START) / 86400000);
  const wkIdx = Math.floor(daysSinceStart / 7);
  const dayIdx = daysSinceStart % 7;
  if(wkIdx >= PLAN_WEEKS.length) return null;
  return { week: PLAN_WEEKS[wkIdx], dayIdx, session: PLAN_WEEKS[wkIdx].days[dayIdx], type: PLAN_WEEKS[wkIdx].types[dayIdx] };
}

function getPhaseForDate(date){
  const d = new Date(date); d.setHours(0,0,0,0);
  if(d < PREP_START) return 'pre';
  const daysSinceStart = Math.floor((d - PREP_START) / 86400000);
  const wkIdx = Math.floor(daysSinceStart / 7);
  if(wkIdx >= PLAN_WEEKS.length) return '5';
  return PLAN_WEEKS[wkIdx].phase;
}

  save();
}

function save(){ localStorage.setItem('im703final', JSON.stringify(sessions)); calcPRs(); }
function saveWk(){ localStorage.setItem('im703wk', JSON.stringify(wkMeta)); }

function getCurrentWkIdx(){
  const d = Math.floor((TODAY - PREP_START) / 86400000 / 7);
  return Math.max(0, Math.min(d, PLAN_WEEKS.length-1));
}

function calcPRs(){
  prs = {};
  sessions.forEach(s => {
    if(s.type==='run' && s.dist){
      const d = parseFloat(s.dist);
      if(!prs.runDist || d > prs.runDist){ prs.runDist = d; prs.runDistId = s.id; }
    }
    if(s.type==='run' && s.pace){
      const p = paceToSec(s.pace);
      if(p>0 && (!prs.runPace || p < prs.runPace)){ prs.runPace = p; prs.runPaceId = s.id; }
    }
    if(s.type==='bike' && s.dist){
      const d = parseFloat(s.dist);
      if(!prs.bikeDist || d > prs.bikeDist){ prs.bikeDist = d; prs.bikeDistId = s.id; }
    }
    if(s.type==='swim' && s.dist){
      const d = parseFloat(s.dist);
      if(!prs.swimDist || d > prs.swimDist){ prs.swimDist = d; prs.swimDistId = s.id; }
    }
  });
}
calcPRs();

function renderHome(){
  const plan = getPlanForDate(TODAY);
  const todaySess = sessions.filter(s => s.date === fmtDate(TODAY, true));
  const streak = calcStreak();
  const diff = Math.ceil((RACE_DATE - TODAY) / 86400000);
  const totalDays = Math.ceil((RACE_DATE - PREP_START) / 86400000);
  const doneDays = Math.max(0, Math.floor((TODAY - PREP_START) / 86400000));
  const prepPct = Math.min(100, Math.round(doneDays/totalDays*100));
  const wkStart = getWkStart(TODAY);
  const wkSessions = sessions.filter(s => { const d=new Date(s.date);d.setHours(0,0,0,0);return d>=wkStart&&d<=TODAY; });

  const wkDoneCount = wkPlan ? countWkDone(wkPlan) : wkSessions.length;
  const wkPct = Math.round(wkDoneCount/7*100);
  const BASELINE = 517;
  const runZ2 = sessions.filter(s=>s.type==='run'&&s.pace&&paceToSec(s.pace)>0).slice(-1);
  const lastPaceSec = runZ2.length ? paceToSec(runZ2[0].pace) : 0;
  const formaPct = lastPaceSec>0 ? Math.max(0,Math.min(100,Math.round(50+(BASELINE-lastPaceSec)/2))) : 0;
  const formaLabel = lastPaceSec>0 ? (lastPaceSec<BASELINE?`+${BASELINE-lastPaceSec}s/km`:lastPaceSec===BASELINE?'baseline':`-${lastPaceSec-BASELINE}s/km`) : '–';
  const alreadyDone = todaySess.length>0;

  // PR banner
  let prBanner = '';
  if(sessions.length>0){
    const last=sessions[0];
    const isPR=last.id===prs.runPaceId||last.id===prs.bikeDistId||last.id===prs.swimDistId||last.id===prs.runDistId;

    </div>`;
  }

  // Today plan content

        <div style="background:${tc.c};border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px">${tc.ico} ${tc.lbl}</div>

      <div style="font-size:20px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:8px">${plan.session}</div>
      <div style="font-size:13px;color:#94a3b8">Týždeň ${plan.week.n} z 20 · ${plan.week.d}</div>`
    : `<div style="font-size:18px;font-weight:700;color:#94a3b8">Pre-season</div>
       <div style="font-size:13px;color:#64748b;margin-top:6px">Príprava štartuje 13. apríla</div>`;

  // Week mini calendar (current week, Mon-Sun)
  const WDAYS = ['Po','Ut','St','Št','Pi','So','Ne'];
  const weekCells = WDAYS.map((d,i) => {
    const dayD = new Date(wkStart); dayD.setDate(dayD.getDate()+i);

    return `<div onclick="openDayModal('${key}')" style="border-radius:10px;background:${bg};border:2px solid ${bg===tc2.lt?tc2.br:border};padding:8px 4px;text-align:center;cursor:pointer;transition:all .12s;${opacity}${isT?';box-shadow:0 0 0 2px #3b82f6,0 0 0 4px rgba(59,130,246,.2)':''}">

function ringHTML(pct, color, label){
  const r = 26, circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  const display = label !== undefined ? label : pct+'%';
  const fontSize = display.length > 4 ? '10px' : '13px';
  return `<div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 64 64">
      <circle class="ring-bg" cx="32" cy="32" r="${r}"/>
      <circle class="ring-fill" cx="32" cy="32" r="${r}" stroke="${color}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="ring-val" style="font-size:${fontSize}">${display}</div>
  </div>`;
}

function calcStreak(){
  const dates = new Set(sessions.map(s=>s.date));
  let streak = 0, d = new Date(TODAY);
  while(true){
    const key = fmtDate(d, true);
    if(!dates.has(key)) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function countWkDone(wk){
  const wkStart = new Date(PREP_START);
  wkStart.setDate(wkStart.getDate() + (wk.n-1)*7);
  return sessions.filter(s=>{
    const d=new Date(s.date);d.setHours(0,0,0,0);
    const end=new Date(wkStart);end.setDate(end.getDate()+6);
    return d>=wkStart&&d<=end;
  }).length;
}

function setModalType(t){
  document.getElementById('m-type').value = t;
  const tc = TC[t]||TC.rest;
  document.querySelectorAll('#modal-type-btns button').forEach(b=>{
    const a=b.dataset.mt===t;
    b.style.background = a ? tc.lt : 'var(--surf2)';
    b.style.borderColor = a ? tc.c : 'var(--brd)';
    b.style.color = a ? tc.c : 'var(--txt3)';
  });
  document.getElementById('m-save-btn').style.background = tc.c;
  // subtype chips
  const subs = MODAL_SUBS[t]||[];
  const subWrap = document.getElementById('modal-sub-wrap');
  const subBtns = document.getElementById('modal-sub-btns');
  if(subs.length && subWrap && subBtns){
    subWrap.style.display = '';
    const firstSub = subs[0];
    document.getElementById('m-sub').value = firstSub;
    subBtns.innerHTML = subs.map((s,i)=>`<button onclick="setModalSub('${s}')" data-ms="${s}" style="padding:5px 11px;font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid ${i===0?tc.c:'var(--brd)'};background:${i===0?tc.lt:'var(--surf2)'};color:${i===0?tc.c:'var(--txt2)'};cursor:pointer;transition:all .12s">${s}</button>`).join('');
    // trigger extra fields for first subtype
    setTimeout(()=>setModalSub(firstSub), 0);
  } else if(subWrap){
    subWrap.style.display = 'none';
  }
  // dist/pace labels
  if(t==='swim'){
    document.getElementById('m-dist-lbl').textContent='Vzdialenosť';
    document.getElementById('m-dist-u').textContent='m';
    document.getElementById('m-pace-lbl').textContent='Tempo';
    document.getElementById('m-pace-u').textContent='min/100m';
  } else if(t==='bike'){
    document.getElementById('m-dist-lbl').textContent='Vzdialenosť';
    document.getElementById('m-dist-u').textContent='km';
    document.getElementById('m-pace-lbl').textContent='Avg rýchlosť';
    document.getElementById('m-pace-u').textContent='km/h';
  } else {
    document.getElementById('m-dist-lbl').textContent='Vzdialenosť';
    document.getElementById('m-dist-u').textContent='km';
    document.getElementById('m-pace-lbl').textContent='Avg pace';
    document.getElementById('m-pace-u').textContent='min/km';
  }
}

function updMZ(){
  const z1=parseInt(document.getElementById('m-z1')?.value)||0,z2=parseInt(document.getElementById('m-z2')?.value)||0,z3=parseInt(document.getElementById('m-z3')?.value)||0,z4=parseInt(document.getElementById('m-z4')?.value)||0;
  const t=z1+z2+z3+z4;
  const bar=document.getElementById('m-zbar'),tot=document.getElementById('m-ztot');
  if(!bar)return;
  if(!t){bar.innerHTML='';tot.textContent='';return;}
  bar.innerHTML=(z1?`<div style="flex:${z1};background:#06b6d4"></div>`:'')+
    (z2?`<div style="flex:${z2};background:#3b82f6"></div>`:'')+
    (z3?`<div style="flex:${z3};background:#f59e0b"></div>`:'')+
    (z4?`<div style="flex:${z4};background:#dc2626"></div>`:'');
  tot.textContent=t===100?'✓ 100%':`${t}%${t>100?' (!)':''}`;
  tot.style.color=t===100?'#16a34a':t>100?'#dc2626':'#d97706';
}

function saveModal(){
  if(!modalDate) return;
  // collect extra fields
  const extraObj = {};
  const t = document.getElementById('m-type')?.value||'run';
  const sub = document.getElementById('m-sub')?.value||'';
  const key = t+'_'+sub.replace(/ /g,'_').replace(/\+/g,'+');
  const ex = MODAL_EXTRA[key];
  if(ex) ex.f.forEach(f=>{
    const el=document.getElementById('mx-'+f.id);
    if(el&&el.value) extraObj[f.l]=el.value;
  });
  const s={
    id:Date.now(),date:modalDate,
    phase:document.getElementById('m-phase')?.value||'pre',
    type:t, sub:sub,
    dist:document.getElementById('m-dist')?.value||'',
    time:document.getElementById('m-time')?.value||'',
    pace:document.getElementById('m-pace')?.value||'',
    hrA:document.getElementById('m-hr-a')?.value||'',
    hrM:document.getElementById('m-hr-m')?.value||'',
    kc:document.getElementById('m-kc')?.value||'',
    z1:document.getElementById('m-z1')?.value||'0',
    z2:document.getElementById('m-z2')?.value||'0',
    z3:document.getElementById('m-z3')?.value||'0',
    z4:document.getElementById('m-z4')?.value||'0',
    loc:curMloc,par:curMpar,feel:curFeel,
    note:document.getElementById('m-note')?.value||'',
    extra:extraObj
  };
  sessions.unshift(s); save();
  closeModal();
  renders[curView]?.();
  if(curView!=='home') renderHome();
}

function delSModal(id){
  sessions=sessions.filter(s=>s.id!==id); save();
  if(modalDate) openDayModal(modalDate);
  renders[curView]?.();
}

function closeModal(e){
  if(e && e.target!==document.getElementById('modal')) return;
  document.getElementById('modal').style.display='none';
  modalDate=null;
}

  if(s.pace)ms.push({v:s.pace,l:s.type==='swim'?'min/100m':s.type==='bike'?'km/h':'min/km'});

          <div style="font-size:11px;color:var(--txt2)">${fmtDateDisp(s.date)} · ${s.time||'–'}${s.dist?' · '+s.dist+(s.type==='swim'?'m':'km'):''}${s.hrA?' · '+s.hrA+' bpm':''} · ${s.loc||''}</div>
        </div>
        <div style="display:flex;gap:2px">${[1,2,3,4,5].map(i=>`<span style="font-size:12px;cursor:pointer;color:${i<=(s.feel||0)?'#f59e0b':'var(--brd2)'}" onclick="setFeel(${s.id},${i})">★</span>`).join('')}</div>
        <button class="btn-del" onclick="delS(${s.id})">×</button>
      </div>
      ${ms.length?`<div class="mc-grid ${mc}" style="margin-top:8px">${mH}</div>`:''}

  return `<div class="scard" style="border-color:${tc.br}">
    <div class="sc-top" style="background:${tc.lt}">
      <div class="sc-hdr">
        <div>
          <div class="sc-badge" style="background:${tc.c}">${tc.ico} ${tc.lbl}${s.sub?' · '+s.sub:''}${isPR?` <span style="font-size:8px;background:rgba(255,255,255,.3);padding:1px 5px;border-radius:8px">PR</span>`:''}</div>
          <div class="sc-title">${fmtDateDisp(s.date)}</div>

      </div>
      ${ms.length?`<div class="mc-grid ${mc}">${mH}</div>`:''}
      ${hasZ?`<div class="zbar-sc">${z1?`<div style="flex:${z1};background:#06b6d4"></div>`:''
        }${z2?`<div style="flex:${z2};background:#3b82f6"></div>`:''
        }${z3?`<div style="flex:${z3};background:#f59e0b"></div>`:''
        }${z4?`<div style="flex:${z4};background:#dc2626"></div>`:''}</div>

}

function getCanvasCtx(id,h){
  const c=document.getElementById(id);if(!c)return null;
  c.width=c.parentNode.offsetWidth||600;c.height=h||180;return c.getContext('2d');
}

function drawChart1(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const tc2=isDark?'#475569':'#94a3b8',gc=isDark?'#1e293b':'#f1f5f9';
  const rel=sessions.filter(s=>{
    if(chartMetric==='pace') return s.type==='run'&&s.pace&&paceToSec(s.pace)>0;
    if(chartMetric==='hr') return s.hrA&&parseInt(s.hrA)>0;
    if(chartMetric==='dist') return s.dist&&parseFloat(s.dist)>0;
    if(chartMetric==='kcal') return s.kc&&parseInt(s.kc)>0;
    return false;
  }).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(rel.length<2){document.getElementById('cw1').innerHTML='<div class="chart-empty"><div style="font-size:24px">📊</div><div>Pridaj viac tréningov pre zobrazenie grafu</div></div>';return;}
  const ctx=getCanvasCtx('cc1',180);if(!ctx)return;
  const W=ctx.canvas.width,H=ctx.canvas.height,pad={t:16,r:16,b:28,l:48};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const vals=rel.map(s=>chartMetric==='pace'?paceToSec(s.pace):chartMetric==='hr'?parseInt(s.hrA):chartMetric==='dist'?parseFloat(s.dist):parseInt(s.kc));
  const minV=Math.min(...vals)*0.95,maxV=Math.max(...vals)*1.05;
  const xStep=gW/Math.max(vals.length-1,1);
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=pad.t+gH*(1-i/4);
    ctx.strokeStyle=gc;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();
    const v=minV+(maxV-minV)*(i/4);
    ctx.fillStyle=tc2;ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText(chartMetric==='pace'?`${Math.floor(v/60)}:${String(Math.round(v%60)).padStart(2,'0')}`:Math.round(v),pad.l-4,y+4);
  }
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);
  grad.addColorStop(0,'rgba(59,130,246,.25)');grad.addColorStop(1,'rgba(59,130,246,.02)');
  ctx.beginPath();
  vals.forEach((v,i)=>{const x=pad.l+i*xStep,y=pad.t+gH*(1-(v-minV)/(maxV-minV));i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(pad.l+(vals.length-1)*xStep,pad.t+gH);ctx.lineTo(pad.l,pad.t+gH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;ctx.lineJoin='round';
  vals.forEach((v,i)=>{const x=pad.l+i*xStep,y=pad.t+gH*(1-(v-minV)/(maxV-minV));i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  vals.forEach((v,i)=>{
    const x=pad.l+i*xStep,y=pad.t+gH*(1-(v-minV)/(maxV-minV));
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle='#3b82f6';ctx.fill();ctx.strokeStyle='var(--surf)';ctx.lineWidth=1.5;ctx.stroke();
    if(i%Math.ceil(vals.length/6)===0||i===vals.length-1){
      const d=rel[i].date.split('-');ctx.fillStyle=tc2;ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText(`${d[2]}.${d[1]}`,x,H-4);
    }
  });
  if(vals.length>2){
    const n=vals.length,sx=vals.map((_,i)=>i).reduce((a,b)=>a+b),sy=vals.reduce((a,b)=>a+b);
    const sx2=vals.map((_,i)=>i*i).reduce((a,b)=>a+b),sxy=vals.map((v,i)=>v*i).reduce((a,b)=>a+b);
    const m=(n*sxy-sx*sy)/(n*sx2-sx*sx),b2=(sy-m*sx)/n;
    ctx.beginPath();ctx.strokeStyle='rgba(234,88,12,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.moveTo(pad.l,pad.t+gH*(1-(m*0+b2-minV)/(maxV-minV)));ctx.lineTo(pad.l+gW,pad.t+gH*(1-(m*(n-1)+b2-minV)/(maxV-minV)));ctx.stroke();ctx.setLineDash([]);
  }
  const leg=document.getElementById('cl1');
  if(leg)leg.innerHTML=`<div class="cl-item"><div class="cl-dot" style="background:#3b82f6"></div>Hodnoty</div><div class="cl-item"><div class="cl-dot" style="background:#ea580c"></div>Trend</div>`;
}

function drawChart2(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const tc2=isDark?'#475569':'#94a3b8',gc=isDark?'#1e293b':'#f1f5f9';
  const wkMap={};
  sessions.forEach(s=>{
    if(!s.date)return;const d=new Date(s.date);
    const wk=`${d.getFullYear()}-${String(Math.ceil((d-new Date(d.getFullYear(),0,1))/604800)+1).padStart(2,'0')}`;
    if(!wkMap[wk])wkMap[wk]={km:0,bk:0};
    const dist=parseFloat(s.dist)||0;
    if(s.type==='bike')wkMap[wk].bk+=dist;else if(s.type==='run'||s.type==='brick')wkMap[wk].km+=dist;
  });
  const wks=Object.keys(wkMap).sort();
  if(wks.length<2){document.getElementById('cw2').innerHTML='<div class="chart-empty"><div style="font-size:24px">📊</div><div>Pridaj viac tréningov</div></div>';return;}
  const ctx=getCanvasCtx('cc2',180);if(!ctx)return;
  const W=ctx.canvas.width,H=ctx.canvas.height,pad={t:16,r:16,b:28,l:40};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const maxKm=Math.max(...wks.map(w=>wkMap[w].km+wkMap[w].bk),1);
  const bW=Math.max(3,Math.floor(gW/wks.length/3));
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=pad.t+gH*(1-i/4);ctx.strokeStyle=gc;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();
    ctx.fillStyle=tc2;ctx.font='10px system-ui';ctx.textAlign='right';ctx.fillText(Math.round(maxKm*i/4),pad.l-4,y+4);
  }
  const xStep=gW/wks.length;
  wks.forEach((wk,i)=>{
    const x=pad.l+i*xStep+xStep/2,d=wkMap[wk];
    if(d.bk>0){const h=(d.bk/maxKm)*gH;ctx.fillStyle='rgba(21,128,61,.6)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x-bW-1,pad.t+gH-h,bW,h,2);else ctx.rect(x-bW-1,pad.t+gH-h,bW,h);ctx.fill();}
    if(d.km>0){const h=(d.km/maxKm)*gH;ctx.fillStyle='rgba(234,88,12,.7)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x+1,pad.t+gH-h,bW,h,2);else ctx.rect(x+1,pad.t+gH-h,bW,h);ctx.fill();}
    if(i%Math.ceil(wks.length/6)===0){ctx.fillStyle=tc2;ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText('T'+(i+1),x,H-4);}
  });
}

function renderWeekly(){
  const wk = PLAN_WEEKS[wkIdx];
  const key = 'wk'+wk.n;
  const wd = wkMeta[key]||{};
  const DAYS=['Po','Ut','St','Št','Pi','So','Ne'];
  const wkStart = new Date(PREP_START);
  wkStart.setDate(wkStart.getDate()+(wk.n-1)*7);
  const wkSess = sessions.filter(s=>{
    const d=new Date(s.date);d.setHours(0,0,0,0);
    const end=new Date(wkStart);end.setDate(end.getDate()+6);
    return d>=wkStart&&d<=end;
  });
  const runSess = wkSess.filter(s=>s.type==='run');
  const avgZ2 = runSess.length?Math.round(runSess.reduce((a,s)=>a+(parseInt(s.z2)||0),0)/runSess.length):0;
  const z2Warn = avgZ2>0&&avgZ2<70;
  const km=wkSess.reduce((a,s)=>a+(s.type==='run'||s.type==='brick'?parseFloat(s.dist)||0:0),0);
  const bk=wkSess.reduce((a,s)=>a+(s.type==='bike'?parseFloat(s.dist)||0:0),0);
  const kc=wkSess.reduce((a,s)=>a+(parseInt(s.kc)||0),0);
  const hrA=runSess.length?Math.round(runSess.reduce((a,s)=>a+(parseInt(s.hrA)||0),0)/runSess.length):0;

  const daysHTML=DAYS.map((d,i)=>{
    const dayD=new Date(wkStart);dayD.setDate(dayD.getDate()+i);
    const key2=fmtDate(dayD,true);
    const dayS=wkSess.filter(s=>s.date===key2);
    const hasSess=dayS.length>0;
    const isPast=dayD<=TODAY;
    const planT=wk.types[i];
    const tc2=hasSess?(TC[dayS[0].type]||TC.rest):(TC[planT]||TC.rest);
    const isMissed=isPast&&!hasSess&&planT!=='rest'&&dayD>=PREP_START;
    return `<div class="wk-day-cell${hasSess?' has-sess':''}${isMissed?' missed-cell':''}" style="${hasSess?`background:${tc2.lt};border-color:${tc2.br}`:''}" onclick="openDayModal('${key2}')">

function importGarminLog(inp){
  const file=inp.files[0];if(!file)return;
  const name=file.name.toLowerCase();
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let data;
      if(name.endsWith('.gpx'))data=parseGPX(e.target.result,file.name);
      else if(name.endsWith('.tcx'))data=parseTCX(e.target.result,file.name);
      else if(name.endsWith('.fit'))data=parseFIT(e.target.result,file.name);
      if(data){ openDayModal(data.date||fmtDate(TODAY,true)); applyToModal(data); }
    }catch(err){alert('Chyba pri importe: '+err.message);}
    inp.value='';
  };
  name.endsWith('.fit')?reader.readAsArrayBuffer(file):reader.readAsText(file);
}

// Garmin parsers
function s2hm(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}:${String(m).padStart(2,'0')}`:`0:${String(m).padStart(2,'0')}`;}
function calcPaceStr(km,sec){if(!km||km<0.1)return'';const ps=sec/km;return`${Math.floor(ps/60)}:${String(Math.round(ps%60)).padStart(2,'0')}`;}
function detType(sport){const s=(sport||'').toLowerCase();if(s.includes('swim')||s.includes('pool'))return'swim';if(s.includes('cycl')||s.includes('bike'))return'bike';if(s.includes('strength'))return'str';return'run';}

function detSubtype(type, activityName, hrAvg, z3pct, z4pct){
  // Detect subtype from activity name + HR data
  const n = (activityName||'').toLowerCase();
  const z3n = parseInt(z3pct)||0, z4n = parseInt(z4pct)||0;
  const hr = parseInt(hrAvg)||0;

  if(type==='run'){
    if(n.includes('interval')||n.includes('interval')) return 'Intervaly';
    if(n.includes('tempo')||n.includes('tempov')) return 'Tempový';
    if(n.includes('long')||n.includes('dlh')||n.includes('long run')) return 'Dlhý beh';
    if(n.includes('brick')||n.includes('t2')) return 'Brick-beh';
    // Auto-detect from HR zones: if >15% in Z3/Z4 = tempo, if Z4>10% = intervals
    if(z4n>10) return 'Intervaly';
    if(z3n>20) return 'Tempový';
    return 'Z2';
  }
  if(type==='swim'){
    if(n.includes('open')||n.includes('ow')||n.includes('lake')||n.includes('jazero')||n.includes('otvorená')) return 'Otvorená voda';
    if(n.includes('50')||n.includes('50m')) return 'Bazén 50m';
    return 'Bazén 25m';
  }
  if(type==='bike'){
    if(n.includes('brick')) return 'Brick-bike';
    if(n.includes('tempo')||n.includes('tempov')||z3n>20) return 'Tempový';
    if(n.includes('hill')||n.includes('kopec')||n.includes('kopce')) return 'Kopce';
    return 'Z2';
  }
  if(type==='str'){
    if(n.includes('a')||n.includes('core')||n.includes('plank')) return 'Sila A';
    if(n.includes('b')||n.includes('upper')) return 'Sila B';
    if(n.includes('c')||n.includes('leg')||n.includes('squat')) return 'Sila C';
    return 'Sila A';
  }
  if(type==='brick') return 'Bike + Beh';
  return '';
}
function calcZ(hrs){if(!hrs?.length)return{z1:'0',z2:'0',z3:'0',z4:'0'};let z1=0,z2=0,z3=0,z4=0;hrs.forEach(h=>{if(h<144)z1++;else if(h<=157)z2++;else if(h<=166)z3++;else z4++;});const t=hrs.length;return{z1:String(Math.round(z1/t*100)),z2:String(Math.round(z2/t*100)),z3:String(Math.round(z3/t*100)),z4:String(Math.round(z4/t*100))};}

function parseGPX(xml,fname){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const pts=[...doc.querySelectorAll('trkpt')];
  let dist=0,hrs=[],startT=null,endT=null,prevLat=null,prevLon=null,date='';
  const dateEl=doc.querySelector('metadata time')||doc.querySelector('time');
  if(dateEl?.textContent) date=dateEl.textContent.split('T')[0];
  pts.forEach(pt=>{
    const lat=parseFloat(pt.getAttribute('lat')),lon=parseFloat(pt.getAttribute('lon'));
    const t=pt.querySelector('time')?.textContent;const hr=parseInt(pt.querySelector('hr,gpxtpx\:hr,ns3\:hr')?.textContent||0);
    if(hr>0)hrs.push(hr);if(t){const ts=new Date(t);if(!startT)startT=ts;endT=ts;if(!date)date=t.split('T')[0];}
    if(prevLat!==null){const R=6371,dLa=(lat-prevLat)*Math.PI/180,dLo=(lon-prevLon)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(prevLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLo/2)**2;dist+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    prevLat=lat;prevLon=lon;
  });
  const sec=startT&&endT?(endT-startT)/1000:0;
  const hrA=hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):0;
  const hrM=hrs.length?Math.max(...hrs):0;
  const z=calcZ(hrs);const type=detType(doc.querySelector('type')?.textContent);
  const actName=doc.querySelector('name')?.textContent||fname.replace(/\.gpx$/i,'')||'';
  const sub=detSubtype(type,actName,hrA>0?String(hrA):'',z.z3,z.z4);
  return{date,type,sub,dist:dist>0?dist.toFixed(type==='swim'?0:2):'',time:sec>0?s2hm(sec):'',pace:type!=='bike'&&dist>0&&sec>0?calcPaceStr(dist,sec):'',hrA:hrA>0?String(hrA):'',hrM:hrM>0?String(hrM):'',kc:'',...z};
}

function parseTCX(xml,fname){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const sport=doc.querySelector('Activity')?.getAttribute('Sport')||'Running';
  // Extract activity name from Notes or first Lap Notes
  const actName = doc.querySelector('Notes')?.textContent || doc.querySelector('Activity Name')?.textContent || fname.replace(/\.tcx$/i,'') || '';
  let date=doc.querySelector('Id')?.textContent?.split('T')[0]||'';
  let dist=0,time=0,cal=0,hrs=[];
  doc.querySelectorAll('Lap').forEach(l=>{dist+=parseFloat(l.querySelector('DistanceMeters')?.textContent||0);time+=parseFloat(l.querySelector('TotalTimeSeconds')?.textContent||0);cal+=parseFloat(l.querySelector('Calories')?.textContent||0);});
  doc.querySelectorAll('HeartRateBpm Value').forEach(e=>{const v=parseInt(e.textContent||0);if(v>0)hrs.push(v);});
  const km=dist/1000;const hrA=hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):0;const hrM=hrs.length?Math.max(...hrs):0;
  const z=calcZ(hrs);const type=detType(sport);
  const sub=detSubtype(type,actName,hrA,z.z3,z.z4);
  return{date,type,sub,dist:km>0?km.toFixed(type==='swim'?0:2):'',time:time>0?s2hm(time):'',pace:type!=='bike'&&km>0&&time>0?calcPaceStr(km,time):'',hrA:hrA>0?String(hrA):'',hrM:hrM>0?String(hrM):'',kc:cal>0?String(Math.round(cal)):'',...z};
}

function parseFIT(buf,fname){
  const bytes=new Uint8Array(buf);let i=14;const defs={};
  let dist=0,time=0,cal=0,hrA=0,hrM=0,date='',sport='running',hrs=[];
  while(i<bytes.length-2){
    const hdr=bytes[i];if(hdr&0x80){i+=2;continue;}
    const isDef=(hdr&0x40)!==0,lmt=hdr&0x0F;
    if(isDef){i++;const arch=bytes[i++];const gm=bytes[i]|(bytes[i+1]<<8);i+=2;const nf=bytes[i++];const fields=[];for(let f=0;f<nf;f++){fields.push({num:bytes[i],size:bytes[i+1]});i+=3;}defs[lmt]={gm,arch,fields};}
    else{i++;const def=defs[lmt];if(!def){i++;continue;}
      def.fields.forEach(f=>{
        const v=f.size===1?bytes[i]:f.size===2?(def.arch===0?(bytes[i]|(bytes[i+1]<<8)):((bytes[i]<<8)|bytes[i+1])):f.size===4?(def.arch===0?((bytes[i]|(bytes[i+1]<<8)|(bytes[i+2]<<16)|(bytes[i+3]<<24))>>>0):(((bytes[i]<<24)|(bytes[i+1]<<16)|(bytes[i+2]<<8)|bytes[i+3])>>>0)):0;
        if(def.gm===12&&f.num===0){if(v===2)sport='cycling';else if(v===5)sport='swimming';}
        if(def.gm===18){if(f.num===9&&v<1e9)time=v/1000;if(f.num===5&&v<1e7)dist=v/100000;if(f.num===11&&v<10000)cal=v;if(f.num===16&&v<250)hrA=v;if(f.num===17&&v<250)hrM=v;if(f.num===2&&v>0&&v<0xFFFFFFFF){const d=new Date((v+631065600)*1000);date=d.toISOString().split('T')[0];}}
        if(def.gm===20&&f.num===3&&v<250&&v>0)hrs.push(v);
        i+=f.size;
      });
    }
  }
  if(!hrA&&hrs.length)hrA=Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length);
  const z=hrs.length>10?calcZ(hrs):{z1:'0',z2:'0',z3:'0',z4:'0'};const type=detType(sport);
  const sub=detSubtype(type,fname.replace(/\.fit$/i,''),hrA>0?String(hrA):'',z.z3,z.z4);
  return{date,type,sub,dist:dist>0?dist.toFixed(type==='swim'?0:2):'',time:time>0?s2hm(time):'',pace:type!=='bike'&&dist>0&&time>0?calcPaceStr(dist,time):'',hrA:hrA>0?String(hrA):'',hrM:hrM>0?String(hrM):'',kc:cal>0?String(cal):'',...z};
}

function paceToSec(p){if(!p||!p.includes(':'))return 0;const pts=p.split(':');return parseInt(pts[0])*60+(parseInt(pts[1])||0);}
function fmtDate(d,asKey=false){const dd=new Date(d);dd.setHours(0,0,0,0);const y=dd.getFullYear(),m=String(dd.getMonth()+1).padStart(2,'0'),day=String(dd.getDate()).padStart(2,'0');return asKey?`${y}-${m}-${day}`:`${day}.${m}.${y}`;}
function fmtDateDisp(s){if(!s)return'–';const p=s.split('-');return`${p[2]}.${p[1]}.${p[0]}`;}
function formatDateSk(d){const months=['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];const days=['nedeľa','pondelok','utorok','streda','štvrtok','piatok','sobota'];return`${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;}
function getWkStart(d){const wd=(d.getDay()+6)%7;const start=new Date(d);start.setDate(start.getDate()-wd);start.setHours(0,0,0,0);return start;}

// Drag & drop
function handleDrop(e){
  e.preventDefault();
  document.getElementById('drag-z').classList.remove('show');
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const name = file.name.toLowerCase();
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      let data;
      if(name.endsWith('.gpx')) data=parseGPX(ev.target.result,file.name);
      else if(name.endsWith('.tcx')) data=parseTCX(ev.target.result,file.name);
      else if(name.endsWith('.fit')) data=parseFIT(ev.target.result,file.name);
      if(data){ openDayModal(data.date||fmtDate(TODAY,true)); setTimeout(()=>applyToModal(data),100); }
    }catch(err){ alert('Chyba: '+err.message); }
  };
  name.endsWith('.fit')?reader.readAsArrayBuffer(file):reader.readAsText(file);
}
